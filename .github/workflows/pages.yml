name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      
      - name: Install mdbook
        run: |
          mkdir -p /tmp/mdbook
          curl -L https://github.com/rust-lang/mdBook/releases/download/v0.4.35/mdbook-v0.4.35-x86_64-unknown-linux-gnu.tar.gz | tar xz -C /tmp/mdbook
          echo "/tmp/mdbook" >> $GITHUB_PATH
        
      - name: Build mdBook
        run: mdbook build docs
        
      - name: Build Rust docs
        run: cargo doc --no-deps --all-features --release
        
      - name: Merge docs
        run: |
          cp -r target/doc/* docs/book/api/ 2>/dev/null || echo "API docs not available yet"
        
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/book
          force_orphan: true
